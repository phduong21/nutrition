<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NutriCheck - Know what you eat</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime&family=Public+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "primary": "#006947",
        "on-primary": "#ffffff",
        "primary-container": "#02855b",
        "surface": "#fff8f6",
        "surface-container-lowest": "#ffffff",
        "surface-container-low": "#fef1ec",
        "on-surface": "#201a18",
        "on-surface-variant": "#3e4942",
        "outline": "#6e7a72",
        "outline-variant": "#bdcac0",
        "border-subtle": "#E2E8E5",
        "background-surface": "#F8FAF9",
        "inverse-surface": "#362f2c",
        "primary-fixed-dim": "#72daa9",
        "nutri-score-a": "#038141",
        "nutri-score-b": "#85BB2F",
        "nutri-score-c": "#FECB02",
        "nutri-score-d": "#EE8100",
        "nutri-score-e": "#E63E11",
        "data-mono": "#663333",
        "error": "#ba1a1a",
        "secondary": "#b12b27",
      },
      fontFamily: {
        "sans": ["Public Sans", "sans-serif"],
        "mono": ["Courier Prime", "monospace"],
      },
      maxWidth: { "container": "1200px" },
    }
  }
}
</script>
<style>
  body { background-color: #F8FAF9; font-family: "Public Sans", sans-serif; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
</style>
</head>
<body class="min-h-screen flex flex-col text-on-surface">

<!-- Nav -->
<header class="bg-surface fixed top-0 w-full z-50 border-b border-border-subtle">
  <div class="max-w-container mx-auto px-12 flex justify-between items-center h-16">
    <div class="flex items-center gap-2">
      <span class="text-2xl font-bold text-primary tracking-tight">NutriCheck</span>
      <span class="text-sm text-on-surface-variant hidden md:block">| Know what you eat</span>
    </div>
    <nav class="hidden md:flex gap-6 items-center">
      <a class="text-primary font-bold border-b-2 border-primary pb-1 text-sm" href="index.html">Home</a>
      <a class="text-on-surface-variant hover:text-primary transition-colors text-sm" href="#">About</a>
    </nav>
  </div>
</header>

<!-- Main -->
<main class="flex-grow pt-24 pb-12 px-4 md:px-12 max-w-container mx-auto w-full flex flex-col justify-center items-center">
  <div class="w-full max-w-2xl flex flex-col items-center text-center gap-8 mt-8">

    <h1 class="text-3xl md:text-4xl font-bold text-on-surface leading-tight tracking-tight">
      Get instant nutrition analysis<br/>for any food product
    </h1>

    <!-- Search -->
    <div class="w-full flex flex-col sm:flex-row gap-3 items-stretch">
      <div class="relative flex-grow">
        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">search</span>
        <input id="barcode-input"
          class="w-full pl-12 pr-4 py-4 rounded-lg bg-white border border-border-subtle focus:border-primary focus:ring-1 focus:ring-primary outline-none text-base text-on-surface placeholder:text-outline-variant shadow-sm transition-all"
          placeholder="Enter barcode (e.g. 3017620422003)"
          type="text"
          autocomplete="off"/>
      </div>
      <button id="analyze-btn"
        class="px-8 py-4 bg-[#006947] hover:bg-[#02855b] text-white font-semibold text-base rounded-lg shadow-sm transition-colors whitespace-nowrap flex items-center justify-center gap-2">
        <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1">analytics</span>
        Analyze
      </button>
    </div>

    <!-- Error -->
    <p id="error-msg" class="hidden text-sm text-error font-medium"></p>

    <!-- Example chips -->
    <div class="flex flex-wrap justify-center gap-3 w-full">
      <span class="text-sm text-on-surface-variant flex items-center h-8">Try an example:</span>
      <button data-barcode="3017620422003"
        class="example-chip font-mono text-sm px-3 py-1 rounded-full border border-border-subtle bg-white text-on-surface hover:border-primary transition-colors flex items-center gap-1 shadow-sm">
        <span class="material-symbols-outlined text-base">barcode_scanner</span>
        Nutella 3017620422003
      </button>
      <button data-barcode="5000159407236"
        class="example-chip font-mono text-sm px-3 py-1 rounded-full border border-border-subtle bg-white text-on-surface hover:border-primary transition-colors flex items-center gap-1 shadow-sm">
        <span class="material-symbols-outlined text-base">barcode_scanner</span>
        5000159407236
      </button>
    </div>

  </div>
</main>

<!-- Footer -->
<footer class="bg-[#fef1ec] w-full py-4 border-t border-border-subtle mt-auto">
  <div class="max-w-container mx-auto px-12 flex flex-col md:flex-row justify-between items-center gap-4 min-h-[48px]">
    <p class="text-sm text-on-surface-variant">© 2024 NutriCheck. Data sourced from Open Food Facts.</p>
    <div class="flex gap-4 text-sm text-on-surface-variant">
      <a class="hover:text-primary transition-colors" href="#">Privacy Policy</a>
      <a class="hover:text-primary transition-colors" href="#">API Documentation</a>
    </div>
  </div>
</footer>

<script>
  const input = document.getElementById('barcode-input');
  const btn = document.getElementById('analyze-btn');
  const errMsg = document.getElementById('error-msg');

  function go(barcode) {
    const b = barcode.trim();
    if (!b) {
      errMsg.textContent = 'Please enter a barcode.';
      errMsg.classList.remove('hidden');
      return;
    }
    errMsg.classList.add('hidden');
    window.location.href = `product.html?barcode=${encodeURIComponent(b)}`;
  }

  btn.addEventListener('click', () => go(input.value));
  input.addEventListener('keydown', e => { if (e.key === 'Enter') go(input.value); });

  document.querySelectorAll('.example-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      input.value = chip.dataset.barcode;
      go(chip.dataset.barcode);
    });
  });
</script>
</body>
</html>
